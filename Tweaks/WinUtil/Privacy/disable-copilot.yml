---
title: Disable Microsoft Copilot
description: Removes the MS Copilot AI built into Windows since 23H2
actions:
  - !registryValue:
    path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsCopilot'
    value: "TurnOffWindowsCopilot"
    data: "1"
    type: REG_DWORD

  - !registryValue:
    path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
    value: "ShowCopilotButton"
    data: "0"
    type: REG_DWORD

  - !registryValue:
    path: 'HKLM\SOFTWARE\Microsoft\Windows\Shell\Copilot'
    value: "IsCopilotAvailable"
    data: "0"
    type: REG_DWORD

  - !registryValue:
    path: 'HKLM\SOFTWARE\Microsoft\Windows\Shell\Copilot'
    value: "CopilotDisabledReason"
    data: "IsEnabledForGeographicRegionFailed"
    type: REG_SZ

  - !registryValue:
    path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsCopilot'
    value: "AllowCopilotRuntime"
    data: "0"
    type: REG_DWORD

  - !registryValue:
    path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked'
    value: "{CB3B0003-8088-4EDE-8769-8B354AB2FF8C}"
    data: ""
    type: REG_SZ

  - !registryValue:
    path: 'HKLM\SOFTWARE\Microsoft\Windows\Shell\Copilot\BingChat'
    value: "IsUserEligible"
    data: "0"
    type: REG_DWORD

  - !powerShell:
    command: |
      Get-AppxPackage -AllUsers *Copilot* | Remove-AppxPackage -AllUsers
      Get-AppxPackage -AllUsers Microsoft.MicrosoftOfficeHub | Remove-AppxPackage -AllUsers

      $Appx = (Get-AppxPackage MicrosoftWindows.Client.CoreAI).PackageFullName

      $Sid = (Get-LocalUser $Env:UserName).Sid.Value
      New-Item \"HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Appx\\AppxAllUserStore\\EndOfLife\\$Sid\\$Appx\" -Force
      Remove-AppxPackage $Appx
