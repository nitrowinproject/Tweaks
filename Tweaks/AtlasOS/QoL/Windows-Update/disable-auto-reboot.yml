---
title: Disable WU Auto-Reboot
description: Disables Windows Update from automatically restarting your computer when there are pending updates
actions:
  - !registryValue:
    path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate'
    value: "AUPowerManagement"
    data: "0"
    type: REG_DWORD

  - !registryValue:
    path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU'
    value: "NoAutoRebootWithLoggedOnUsers"
    data: "1"
    type: REG_DWORD
