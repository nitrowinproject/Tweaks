---
title: Hide Recent Items
description: Hides recent items in Quick Access and other places for privacy and QoL
actions:
  - !registryValue:
    path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer'
    value: "ShowFrequent"
    data: "0"
    type: REG_DWORD

  - !registryValue:
    path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer'
    value: "ShowRecent"
    data: "0"
    type: REG_DWORD

  - !registryValue:
    path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
    value: "Start_TrackDocs"
    data: "0"
    type: REG_DWORD

  - !registryValue:
    path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer'
    value: "ClearRecentDocsOnExit"
    data: "1"
    type: REG_DWORD

  - !registryValue:
    path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer'
    value: "NoRecentDocsHistory"
    data: "1"
    type: REG_DWORD

  - !registryValue:
    path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\Explorer'
    value: "NoRemoteDestinations"
    data: "1"
    type: REG_DWORD
